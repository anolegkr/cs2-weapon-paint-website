version: "3"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cs2

  cs2-server:
    image: cs2-server-image
    ports:
      - "27015:27015/udp"
